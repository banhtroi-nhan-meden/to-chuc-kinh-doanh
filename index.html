<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Founder Organization Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563EB;--dark:#0F172A;--light:#DBEAFE;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#fff;overflow:hidden}
.slide{display:none;height:100vh;padding:70px;background:linear-gradient(135deg,#fff,#f4f8ff)}
.slide.active{display:flex}
.wrap{width:100%;display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center}
.tag{color:var(--blue);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
h1{font-size:58px;color:var(--dark);margin:14px 0}
h2{font-size:24px;color:#334155;margin-bottom:24px}
ul{padding-left:22px;line-height:1.8;color:#334155;font-size:18px}
.quote{margin-top:28px;border-left:4px solid var(--blue);padding-left:16px;font-size:22px;font-weight:700;color:var(--dark)}
.visual{display:flex;align-items:center;justify-content:center}
.circle{width:320px;height:320px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#60A5FA);color:#fff;font-size:34px;font-weight:800;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}
.num{position:absolute;bottom:30px;left:40px;color:#64748B}
.nav{position:fixed;right:20px;bottom:20px;display:flex;gap:10px}
button{padding:10px 16px;border:none;border-radius:8px;background:#2563EB;color:#fff;cursor:pointer}
</style>
</head>
<body>

<div id="slides"></div>

<div class="nav">
<button onclick="prevSlide()">← Prev</button>
<button onclick="nextSlide()">Next →</button>
</div>

<script>
const slides=[
["ORGANIZATION FIRST","Tổ chức là nền móng của tăng trưởng",["Startup không chỉ là sản phẩm và doanh số","Cấu trúc và văn hóa cần được thiết kế từ sớm","Nền móng vững giúp doanh nghiệp vượt qua biến động"],"Growth starts with structure.","GROWTH"],
["THE COST OF CHAOS","Tăng trưởng nhanh không thể thay thế quản trị",["Vai trò mập mờ tạo ra xung đột","Quyết định chậm dần khi quy mô mở rộng","Thiếu cấu trúc dẫn tới khủng hoảng tổ chức"],"Scale without governance creates risk.","CHAOS"],
["STRATEGY NEEDS STRUCTURE","Tổ chức là bộ xương sống của chiến lược",["Chiến lược chỉ thành công khi được thực thi","Cơ cấu quyết định tốc độ triển khai","Tư duy hệ thống là năng lực cốt lõi"],"Strategy → Structure → Execution","EXECUTION"],
["FROM DOER TO LEADER","Chuyển đổi từ Tự làm sang Tổ chức làm",["Founder làm mọi việc","Bắt đầu ủy quyền","Huấn luyện và dẫn dắt đội ngũ"],"Doer → Manager → Leader","LEADER"],
["SYSTEMS SCALE","Đỉnh cao của quản trị là hệ thống vận hành",["Quy trình thay thế phụ thuộc cá nhân","Tự động hóa tăng hiệu suất","Văn hóa tạo tính nhất quán"],"Hệ thống làm việc thay cho nhà sáng lập.","SYSTEM"],
["BUILD EARLY","Thiết kế tổ chức trước khi quá muộn",["Bắt đầu từ nhóm nòng cốt","Chuẩn bị cho tăng trưởng","Tạo đòn bẩy mở rộng"],"Culture → Performance → Growth","SCALE"],
["FUNCTIONAL STRUCTURE","Mô hình phân cấp truyền thống",["Chuyên môn hóa phòng ban","Kiểm soát ổn định","Giảm linh hoạt"],"Doanh nghiệp ưu tiên kiểm soát.","FUNCTION"],
["FLAT ORGANIZATION","Tăng tốc thông qua trao quyền",["Giảm tầng quản lý","Ra quyết định nhanh","Tự chủ cao"],"Nhanh hơn nhưng cần kỷ luật cao hơn.","FLAT"],
["MATRIX MODEL","Cân bằng giữa chuyên môn và dự án",["Hai tuyến quản lý","Liên kết phòng ban","Thích ứng cao"],"Chuyên môn sâu + Linh hoạt cao.","MATRIX"],
["AGILE ORGANIZATION","Mô hình Spotify",["Squad","Tribe","Chapter & Guild"],"Đội ngũ tự chủ thúc đẩy đổi mới.","AGILE"],
["NETWORK ORGANIZATION","Tổ chức không biên giới",["Xóa rào cản chức năng","Kết nối đối tác","Tối ưu trí tuệ tập thể"],"Collaboration at scale.","NETWORK"],
["FIT THE STRATEGY","Không có mô hình hoàn hảo",["Cấu trúc phục vụ chiến lược","Đổi mới cần linh hoạt","Mở rộng cần chuẩn hóa"],"Structure follows strategy.","FIT"],
["CHIEF ARCHITECT","Founder phải làm việc trên doanh nghiệp",["Thiết kế hệ thống","Xây dựng quy trình","Giảm phụ thuộc cá nhân"],"Work on the business, not in the business.","ARCHITECT"],
["BUILD THE CORE TEAM","Xác lập các vai trò chiến lược",["CEO","COO","Product Lead • Marketing Lead • CFO"],"Tuyển đúng vai trước khi tuyển đúng người.","TEAM"],
["ORGANIZATION ROADMAP","Tổ chức cần được thiết kế cho tương lai",["Phân quyền rõ ràng","Tránh chồng chéo","Đồng bộ mở rộng"],"Clarity drives execution.","ROADMAP"],
["VALUE CHAIN THINKING","Tối ưu toàn bộ dòng chảy giá trị",["Kết nối bộ phận","Loại bỏ điểm nghẽn","Kaizen liên tục"],"Customer value first.","VALUE"],
["RACI FRAMEWORK","Phân định trách nhiệm rõ ràng",["Responsible","Accountable","Consulted • Informed"],"Một nhiệm vụ chỉ có một chủ sở hữu cuối cùng.","RACI"],
["DATA-DRIVEN MANAGEMENT","Quản trị bằng dữ liệu",["KPI","OKR","CRM • ERP • BI"],"Dữ liệu dẫn dắt quyết định.","DATA"],
["TRANSPARENT COMMUNICATION","Giao tiếp là huyết mạch tổ chức",["Thông tin hai chiều","Gia tăng niềm tin","Hỗ trợ phân quyền"],"Transparency creates alignment.","TRUST"],
["KNOWLEDGE ASSET","Kho tri thức là tài sản chiến lược",["Lưu trữ tập trung","Giảm phụ thuộc cá nhân","Tăng tốc đào tạo"],"Wiki • Drive • Knowledge Base","KNOWLEDGE"],
["CULTURE IN ACTION","Văn hóa được thể hiện qua hành vi",["Không chỉ là khẩu hiệu","Hỗ trợ tự chủ","Tạo tính nhất quán"],"Culture is what people do when nobody watches.","CULTURE"],
["THE GOLDEN TRIANGLE","Tam giác vàng quản trị",["Empowerment","Control","Transparency"],"Phân quyền × Kiểm soát × Minh bạch","BALANCE"],
["BUILD THE NEXT LEADERS","Phát triển đội ngũ kế cận",["Quản lý cấp trung","Kết nối chiến lược","Kết hợp nội lực và chuyên gia"],"Sustainable leadership pipeline.","LEADERS"],
["SCALE WITHOUT CHAOS","Tăng trưởng bền vững bắt đầu từ con người",["An toàn tâm lý","Loại bỏ điểm nghẽn","Mở rộng không mất kiểm soát"],"Great companies scale through systems, culture and people.","FUTURE"]
];

const holder=document.getElementById('slides');
slides.forEach((s,i)=>{
holder.innerHTML+=`
<section class="slide ${i===0?'active':''}">
<div class="wrap">
<div>
<div class="tag">Founder Organization Playbook</div>
<h1>${s[0]}</h1>
<h2>${s[1]}</h2>
<ul>${s[2].map(x=>`<li>${x}</li>`).join('')}</ul>
<div class="quote">${s[3]}</div>
</div>
<div class="visual"><div class="circle">${s[4]}</div></div>
</div>
<div class="num">${String(i+1).padStart(2,'0')} / 24</div>
</section>`;
});

let current=0;
const all=()=>document.querySelectorAll('.slide');
function show(n){all().forEach(x=>x.classList.remove('active'));all()[n].classList.add('active');}
function nextSlide(){if(current<23){current++;show(current);}}
function prevSlide(){if(current>0){current--;show(current);}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextSlide();if(e.key==='ArrowLeft')prevSlide();});
</script>
</body>
</html>
