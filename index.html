<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Organization Playbook Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--blue:#2563EB;
--blue2:#60A5FA;
--cyan:#38BDF8;
--dark:#0F172A;
--gray:#475569;
--muted:#64748B;
--line:#E2E8F0;
--light:#F8FBFF;
--white:rgba(255,255,255,.88);
--shadow:0 24px 70px rgba(15,23,42,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;}
body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden;color:var(--dark)}
.progress{position:fixed;top:0;left:0;width:100%;height:4px;background:#e5e7eb;z-index:9999}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--blue2),var(--cyan));transition:.4s}
.slide{
display:none;
height:100vh;
padding:48px 6vw 88px;
position:relative;
background:linear-gradient(135deg,#ffffff 0%,#f6f9ff 52%,#eef6ff 100%);
overflow:hidden;
}
.slide.active{display:flex;animation:slideIn .55s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(30px) scale(.985)}to{opacity:1;transform:none}}
.slide::before,.slide::after{content:"";position:absolute;border-radius:999px;filter:blur(28px);opacity:.72;z-index:0;pointer-events:none}
.slide::before{width:310px;height:310px;background:radial-gradient(circle,rgba(96,165,250,.50),rgba(37,99,235,.08) 65%,transparent 70%);right:-80px;top:60px}
.slide::after{width:260px;height:260px;background:radial-gradient(circle,rgba(56,189,248,.34),rgba(14,165,233,.08) 62%,transparent 72%);left:-100px;bottom:30px}
.bg-shape{position:absolute;border-radius:999px;filter:blur(20px);opacity:.46;pointer-events:none;z-index:0}
.bg-shape.one{width:160px;height:160px;background:rgba(37,99,235,.18);left:58%;top:12%}
.bg-shape.two{width:120px;height:120px;background:rgba(96,165,250,.24);right:18%;bottom:14%}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.055) 1px,transparent 1px);background-size:38px 38px;mask-image:linear-gradient(90deg,transparent,black 18%,black 82%,transparent);z-index:0}
.wrap{width:100%;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);gap:clamp(28px,4vw,60px);align-items:center;position:relative;z-index:1}
.content{max-width:820px}
.tag{font-size:12px;letter-spacing:2.2px;font-weight:800;color:var(--blue);text-transform:uppercase;margin-bottom:12px}
.part-tag{display:inline-flex;align-items:center;gap:9px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#2563EB;font-weight:800;background:rgba(239,246,255,.82);border:1px solid #DBEAFE;border-radius:999px;padding:8px 12px;margin-bottom:14px;backdrop-filter:blur(10px)}
h1{font-size:clamp(2.2rem,4.6vw,4.85rem);line-height:.96;letter-spacing:-.055em;color:var(--dark);margin:10px 0 16px;font-weight:900}
h2{font-size:clamp(1.02rem,1.8vw,1.45rem);line-height:1.42;color:var(--gray);font-weight:650;margin-bottom:22px;max-width:760px}
ul{list-style:none}
.bullet-list{display:grid;gap:12px;max-width:760px}
.bullet-list li{background:var(--white);border:1px solid var(--line);padding:14px 18px 14px 48px;border-radius:16px;position:relative;line-height:1.45;box-shadow:0 10px 32px rgba(15,23,42,.045);transition:.35s;backdrop-filter:blur(10px)}
.bullet-list li::before{content:"";position:absolute;left:18px;top:19px;width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue2));box-shadow:0 0 0 5px rgba(96,165,250,.13)}
@media (hover:hover){.bullet-list li:hover,.card:hover,.comp-card:hover,.role-card:hover{transform:translateY(-3px);border-color:#93C5FD;box-shadow:0 18px 44px rgba(37,99,235,.13)}}
.quote{margin-top:22px;background:rgba(255,255,255,.74);border:1px solid #DBEAFE;border-left:5px solid var(--blue);border-radius:18px;padding:16px 18px;box-shadow:0 14px 42px rgba(37,99,235,.08);backdrop-filter:blur(12px)}
.quote .label{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--blue);font-weight:900;margin-bottom:5px}
.quote .text{font-size:clamp(1rem,1.55vw,1.32rem);font-weight:850;color:#0F172A;line-height:1.35}
.visual{display:flex;justify-content:center;align-items:center;min-height:390px;position:relative}
.circle{width:min(34vw,330px);height:min(34vw,330px);min-width:230px;min-height:230px;border-radius:50%;background:linear-gradient(135deg,#1D4ED8,var(--blue2));color:white;display:flex;align-items:center;justify-content:center;font-size:clamp(1.45rem,2.3vw,2.25rem);font-weight:900;text-align:center;padding:30px;box-shadow:0 28px 78px rgba(37,99,235,.25);position:relative;overflow:hidden}
.circle::after{content:"";position:absolute;inset:18px;border:1px solid rgba(255,255,255,.26);border-radius:inherit}
.orbit{position:absolute;width:min(42vw,430px);height:min(42vw,430px);min-width:290px;min-height:290px;border:1px dashed rgba(37,99,235,.22);border-radius:50%;animation:spin 20s linear infinite}
.orbit::before,.orbit::after{content:"";position:absolute;width:15px;height:15px;border-radius:50%;background:#60A5FA;box-shadow:0 0 0 9px rgba(96,165,250,.13)}
.orbit::before{top:18%;left:4%}.orbit::after{right:8%;bottom:16%}
@keyframes spin{to{transform:rotate(360deg)}}
.card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;width:100%;max-width:560px}
.card,.comp-card,.role-card{background:rgba(255,255,255,.84);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 14px 42px rgba(15,23,42,.06);backdrop-filter:blur(12px);transition:.35s}
.card h3,.comp-card h3,.role-card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--blue);margin-bottom:8px}
.card p,.comp-card p,.role-card p{font-size:1rem;color:#334155;font-weight:650;line-height:1.38}
.model-layout .wrap{grid-template-columns:minmax(0,.96fr) minmax(350px,1.04fr)}
.comparison-grid{display:grid;grid-template-columns:1fr;gap:14px;width:100%;max-width:560px}
.flow-row{display:flex;align-items:center;justify-content:center;gap:13px;flex-wrap:wrap;margin-top:8px}
.flow-box{background:rgba(255,255,255,.88);border:1px solid #BFDBFE;border-radius:18px;padding:18px 22px;min-width:142px;text-align:center;font-weight:900;color:#1E3A8A;box-shadow:0 16px 44px rgba(37,99,235,.10);backdrop-filter:blur(10px)}
.arrow{font-size:2rem;color:#60A5FA;font-weight:900}
.spotify-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px;width:100%;max-width:520px}
.spotify-card{min-height:132px;display:flex;flex-direction:column;justify-content:space-between}
.spotify-card strong{font-size:1.45rem;color:#0F172A}.spotify-card span{color:#64748B;line-height:1.4;margin-top:10px}
.roles-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;width:100%;max-width:560px}
.role-card:last-child{grid-column:1/-1}
.raci-grid{display:grid;gap:12px;width:100%;max-width:520px}
.raci-item{display:grid;grid-template-columns:74px 1fr;gap:14px;align-items:center;background:rgba(255,255,255,.86);border:1px solid #DBEAFE;border-radius:18px;padding:16px;box-shadow:0 16px 44px rgba(15,23,42,.06)}
.raci-letter{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;color:white;font-size:1.65rem;font-weight:900}
.raci-item b{font-size:1.08rem;color:#0F172A}.raci-item p{color:#64748B;margin-top:3px}
.stack-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center}
.stack-pill{background:linear-gradient(135deg,#1D4ED8,#60A5FA);color:white;border-radius:18px;padding:18px 24px;font-weight:900;box-shadow:0 18px 50px rgba(37,99,235,.22)}
.triangle{position:relative;width:min(39vw,420px);height:330px;min-width:320px}
.triangle-line{position:absolute;inset:26px;background:linear-gradient(135deg,rgba(37,99,235,.16),rgba(96,165,250,.05));clip-path:polygon(50% 0,100% 100%,0 100%);border-radius:20px;filter:drop-shadow(0 18px 36px rgba(37,99,235,.12))}
.tri-node{position:absolute;background:rgba(255,255,255,.92);border:1px solid #BFDBFE;padding:16px 18px;border-radius:18px;font-weight:900;color:#1E3A8A;box-shadow:0 16px 42px rgba(15,23,42,.08);backdrop-filter:blur(10px)}
.tri-node.top{top:0;left:50%;transform:translateX(-50%)}.tri-node.left{bottom:15px;left:0}.tri-node.right{bottom:15px;right:0}
.closing{display:grid;grid-template-columns:1.05fr .95fr;gap:50px;align-items:center;width:100%;position:relative;z-index:1}
.closing .final{background:rgba(15,23,42,.94);color:white;border-radius:34px;padding:42px;box-shadow:0 30px 90px rgba(15,23,42,.24);position:relative;overflow:hidden}
.final::before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(96,165,250,.28);filter:blur(24px);right:-70px;top:-70px}
.final h1{color:white;font-size:clamp(2.45rem,5vw,5.15rem)}.final p{font-size:clamp(1.05rem,1.7vw,1.55rem);line-height:1.45;color:#DBEAFE;font-weight:650;position:relative}
.num{position:absolute;left:30px;bottom:28px;color:#64748B;font-weight:800;letter-spacing:1px;z-index:2}
.nav{position:fixed;bottom:18px;right:18px;display:flex;gap:10px;z-index:999}
button{border:none;background:linear-gradient(135deg,var(--blue),#1D4ED8);color:white;padding:12px 18px;border-radius:12px;cursor:pointer;font-weight:800;box-shadow:0 12px 30px rgba(37,99,235,.20)}
button:active{transform:translateY(1px)}
@media(max-width:980px){
body{overflow:auto}
.slide{height:auto;min-height:100vh;padding:38px 5vw 92px}
.wrap,.model-layout .wrap,.closing{grid-template-columns:1fr;gap:26px}
.visual{min-height:250px;order:2}
.circle{width:240px;height:240px;min-width:210px;min-height:210px}
.orbit{width:300px;height:300px;min-width:280px;min-height:280px}
.card-grid,.roles-grid,.spotify-grid{grid-template-columns:1fr}
.role-card:last-child{grid-column:auto}
.triangle{width:340px;height:300px;margin:auto}
}
@media(max-width:560px){
.slide{padding:30px 18px 86px}
h1{font-size:clamp(2rem,14vw,3.2rem)}
h2{font-size:1rem}
.part-tag{font-size:10px;line-height:1.35;align-items:flex-start}
.bullet-list li{padding:13px 14px 13px 42px;font-size:.96rem}
.quote{padding:14px}
.visual{min-height:210px}
.circle{width:205px;height:205px;min-width:190px;min-height:190px;font-size:1.35rem}
.orbit{display:none}
.nav{left:18px;right:18px;justify-content:space-between}
button{padding:11px 14px}
.raci-item{grid-template-columns:58px 1fr;padding:13px}
.raci-letter{width:46px;height:46px;font-size:1.35rem}
.triangle{width:100%;min-width:0;height:280px}
.tri-node{font-size:.9rem;padding:13px}
}
</style>
</head>

const holder=document.getElementById('slides');
const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function bullets(items){return `<ul class="bullet-list">${(items||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}
function quoteBlock(s){return `<div class="quote"><div class="label">${esc(s.label||'Insight')}</div><div class="text">${esc(s.quote||'')}</div></div>`}
function bg(){return `<div class="bg-grid"></div><div class="bg-shape one"></div><div class="bg-shape two"></div>`}
function header(s){return `<div class="part-tag"><span>${esc(s.no)}</span><span>${esc(s.part)}</span></div><div class="tag">${esc(s.tag||'Founder Organization Playbook')}</div><h1>${esc(s.title)}</h1><h2>${esc(s.sub)}</h2>`}
function visualCircle(s){return `<div class="visual"><div class="orbit"></div><div class="circle">${esc(s.visual||s.title)}</div></div>`}
function cardList(s){return `<div class="card-grid">${(s.items||[]).map((x,idx)=>`<div class="card"><h3>${idx+1<10?'0':''}${idx+1}</h3><p>${esc(x)}</p></div>`).join('')}</div>`}
function comparisonCards(s){return `<div class="comparison-grid">${(s.cards||[]).map(c=>`<div class="comp-card"><h3>${esc(c[0])}</h3><p>${esc(c[1])}</p></div>`).join('')}</div>`}
function slideInsight(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${bullets(s.items)}${quoteBlock(s)}</div>${visualCircle(s)}</div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideModel(s,i){return `<section class="slide model-layout ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${bullets(s.items)}${quoteBlock(s)}</div><div class="visual">${comparisonCards(s)}</div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideFlow(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${bullets(s.items)}${quoteBlock(s)}</div><div class="visual"><div><div class="flow-row">${(s.flow||[]).map((x,idx)=>`<div class="flow-box">${esc(x)}</div>${idx<(s.flow||[]).length-1?'<div class="arrow">→</div>':''}`).join('')}</div></div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideSpotify(s,i){const defs={Squad:'Đội nhỏ tự chủ theo sản phẩm hoặc mục tiêu',Tribe:'Nhóm nhiều squad cùng một lĩnh vực',Chapter:'Cộng đồng chuyên môn cùng năng lực',Guild:'Mạng lưới chia sẻ tri thức tự nguyện'};return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${quoteBlock(s)}</div><div class="visual"><div class="spotify-grid">${(s.items||[]).map(x=>`<div class="card spotify-card"><strong>${esc(x)}</strong><span>${esc(defs[x]||'Agile unit')}</span></div>`).join('')}</div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideRoles(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${quoteBlock(s)}</div><div class="visual"><div class="roles-grid">${(s.items||[]).map(x=>`<div class="role-card"><h3>Core Role</h3><p>${esc(x)}</p></div>`).join('')}</div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideRaci(s,i){const map={'R':'Responsible','A':'Accountable','C':'Consulted','I':'Informed'};return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${quoteBlock(s)}</div><div class="visual"><div class="raci-grid">${Object.entries(map).map(([k,v])=>`<div class="raci-item"><div class="raci-letter">${k}</div><div><b>${v}</b><p>${k==='R'?'Người trực tiếp thực hiện':k==='A'?'Người chịu trách nhiệm cuối cùng':k==='C'?'Người cần được tham vấn':'Người cần được cập nhật'}</p></div></div>`).join('')}</div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideStack(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${bullets(s.items)}${quoteBlock(s)}</div><div class="visual"><div class="stack-row">${(s.stack||[]).map(x=>`<div class="stack-pill">${esc(x)}</div>`).join('')}</div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideTriangle(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="wrap"><div class="content">${header(s)}${quoteBlock(s)}</div><div class="visual"><div class="triangle"><div class="triangle-line"></div><div class="tri-node top">Transparency</div><div class="tri-node left">Control</div><div class="tri-node right">Empowerment</div></div></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function slideClosing(s,i){return `<section class="slide ${i===0?'active':''}">${bg()}<div class="closing"><div class="content">${header(s)}${bullets(s.items)}${quoteBlock(s)}</div><div class="final"><h1>${esc(s.title)}</h1><p>${esc(s.quote)}</p></div></div><div class="num">${esc(s.no)} / 24</div></section>`}
function render(s,i){
 if(s.type==='model') return slideModel(s,i);
 if(s.type==='flow') return slideFlow(s,i);
 if(s.type==='spotify') return slideSpotify(s,i);
 if(s.type==='roles') return slideRoles(s,i);
 if(s.type==='raci') return slideRaci(s,i);
 if(s.type==='stack') return slideStack(s,i);
 if(s.type==='triangle') return slideTriangle(s,i);
 if(s.type==='closing') return slideClosing(s,i);
 return slideInsight(s,i);
}
holder.innerHTML=deck.map(render).join('');
let current=0;
const slides=document.querySelectorAll('.slide');
function update(){slides.forEach(x=>x.classList.remove('active'));slides[current].classList.add('active');document.getElementById('bar').style.width=((current+1)/slides.length*100)+'%';}
function nextSlide(){if(current<slides.length-1){current++;update();}}
function prevSlide(){if(current>0){current--;update();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')nextSlide();if(e.key==='ArrowLeft'||e.key==='PageUp')prevSlide();if(e.key==='Home'){current=0;update();}if(e.key==='End'){current=slides.length-1;update();}});
let sx=0;document.addEventListener('touchstart',e=>sx=e.changedTouches[0].screenX);document.addEventListener('touchend',e=>{let ex=e.changedTouches[0].screenX;if(sx-ex>50)nextSlide();if(ex-sx>50)prevSlide();});
update();
</script>
</body>
